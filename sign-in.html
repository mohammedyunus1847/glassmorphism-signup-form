<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up form </title>
    <link rel="stylesheet" href="signin.css">
</head>
<body>
   
        <div class="maindiv"> 
            <form action="">
                <h2>Sign up</h2>
                <p>Start your 7-day free trial </p>
                 <div class="nameinput">
                    <label  class="namelabel" for="name">Name</label>
                    <input  class="nameinputbox" type="text" name="name" id="name" placeholder="Enter your name" required>
                    
                 </div>  
                <div class="emailinput">
                    <label class="Emaillabel" for="Email">Email</label>
                    <input class="emailinputbox" type="email" name="Email" id="Email" placeholder="Enter your Email " required>
                </div> 
                 <div class="passinput">
                    <label class="passlabel" for="pass">Password</label>
                    <input  class="inputpass"type="password" name="pass" id="pass" placeholder="Create a password" required minlength="9">
                    <p class="passp" >Must be at least 9 characters </p>
                </div>
                <div class="Create">
                    <button class="accountbutton" type="submit" >Create account </button>
                </div>
                <div class="googlebutton">
                    <a href="#">
                        <button class="googlesignup">
                        <img class ="googlelogo" src="search.png" alt=""> Sign up  with google </button></a>
                    
                    <button class="applebutton">
                        <img class="applelogo" src="apple.png" alt="">Sign up with Apple </button>
                </div>
                
                 
            </form>
            
        </div>


            
   
    
</body>
</html>
